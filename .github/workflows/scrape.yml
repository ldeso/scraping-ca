name: Scrape Climate Active certified brands

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python scrape.py --output certified_brands.csv

      - name: Upload CSV as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: certified_brands
          path: certified_brands.csv

      - name: Commit updated CSV
        run: |
          if [[ -n "$(git status --porcelain certified_brands.csv)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add certified_brands.csv
            git commit -m "chore: update certified brands CSV"
            git push
          else
            echo "No CSV changes to commit."
          fi
